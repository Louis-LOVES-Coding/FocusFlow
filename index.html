<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="settings-btn">⚙️</button>
    <div class="container">
        <h1>Pomodoro Timer</h1>
        <div class="timer">
            <span id="minutes">25</span>:<span id="seconds">00</span>
        </div>
        <div class="controls">
            <button id="start">Start</button>
            <button id="pause">Pauze</button>
            <button id="reset">Reset</button>
        </div>
    </div>
    
    <div class="settings-menu hidden" id="settings-menu">
        <h2>Instellingen</h2>
        <label for="pomodoro">Pomodoro minuten:</label>
        <input type="number" id="pomodoro" value="25" min="1" max="60">
        <label for="shortBreak">Korte pauze minuten:</label>
        <input type="number" id="shortBreak" value="5" min="1" max="30">
        <label for="longBreak">Lange pauze minuten:</label>
        <input type="number" id="longBreak" value="15" min="1" max="60">
        <label for="darkMode">Dark Mode:</label>
        <input type="checkbox" id="darkMode">
        <button id="save-settings">Opslaan</button>
    </div>
    
    <audio id="alarmSound" src="alarm.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
